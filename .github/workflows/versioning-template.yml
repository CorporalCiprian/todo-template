name: versioning template
on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    secrets:
      tk:
        required: true

jobs:
  version_and_push:
    runs-on: ubuntu-latest
    permissions:  
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{secrets.tk}}
      - name: branch name validation
        id: branch_valid
        run: |
          BRANCH='${{inputs.branch}}'
          if [[ "$BRANCH" == feature/* ]]; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi
        
      - name: get latest tag
        id: get_latest_tag
        run: |
          git fetch --tags
          latest_tag=$(git tag -l --sort=-v:refname | head -n 1)
          if [[ -z $latest_tag ]]; then
            latest_tag='v0.0.0'
          fi
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: bump latest tag
        id: bump_tag
        run: |
          version=${{steps.get_latest_tag.outputs.tag}}
          version=${version#v}
          IFS="." read -r major minor patch <<< "$version"
          if [[ ${{steps.branch_valid.outputs.bump}} == 'minor' ]]; then
            minor=$((minor+1))
            patch=0
          else
            patch=$((patch+1))
          fi
          echo "new_version=v$major.$minor.$patch" >> "$GITHUB_OUTPUT"

      - name: build and push tag
        run: |
          git config user.name actions_worker
          git config user.email actions_worker@something.some
          git tag -a ${{steps.bump_tag.outputs.new_version}} -m "bumped ${{steps.branch_valid.outputs.bump}}"
          git push origin ${{steps.bump_tag.outputs.new_version}}