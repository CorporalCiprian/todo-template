on: 
  workflow_call:
    secrets:
      AZURE_CREDENTIALS:
        required: true

permissions:
  contents: read
jobs:
  plan:
    name: Terraform init + plan
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan