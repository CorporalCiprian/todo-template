on: 
  workflow_call:
    secrets:
      AZURE_CREDENTIALS:
        required: true

jobs:
  plan:
    name: Terraform init + plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform setup
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -input=false -out "plan.tfplan" | tee plan.txt 

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan.tfplan
          path: ./terraform/plan.tfplan
          retention-days: 1
      
      - name: Print job summary
        uses: sgametrio/terraform-summary-action@v1.1
        with:
          log-file: plan.txt
          title: Plan Summary